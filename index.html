<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raymon Trading Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0:#060a13; --bg1:#0b1121; --bg2:#111a2e; --bg3:#162038; --bg4:#1c2844;
            --border:#1a2540; --border2:#253356;
            --text:#f1f5f9; --text2:#94a3b8; --text3:#5b6b8a;
            --green:#00e396; --green2:#00c27a; --green-bg:rgba(0,227,150,0.08); --green-glow:rgba(0,227,150,0.25);
            --red:#ff4560; --red2:#e63950; --red-bg:rgba(255,69,96,0.08); --red-glow:rgba(255,69,96,0.25);
            --yellow:#feb019; --yellow-bg:rgba(254,176,25,0.08);
            --blue:#008ffb; --blue2:#0070d1; --blue-bg:rgba(0,143,251,0.08); --blue-glow:rgba(0,143,251,0.2);
            --cyan:#00e5ff; --cyan2:#00b8d4; --cyan-bg:rgba(0,229,255,0.06); --cyan-glow:rgba(0,229,255,0.15);
            --purple:#775dd0; --purple-bg:rgba(119,93,208,0.08);
            --orange:#ff6c2f; --orange-bg:rgba(255,108,47,0.08);
            --gold:#ffd700;
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;height:100%;background:var(--bg0);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:13px;line-height:1.5;overflow:hidden}
        .container{display:flex;flex-direction:column;height:100dvh;width:100%}

        /* HEADER */
        .header{background:linear-gradient(180deg,var(--bg1) 0%,var(--bg0) 100%);padding:14px 16px 0;flex-shrink:0;z-index:100;border-bottom:1px solid var(--border)}
        .h-row1{display:flex;justify-content:space-between;align-items:center}
        .logo{font-weight:900;font-size:14px;letter-spacing:2px;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .live-pip{width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;margin-left:6px;box-shadow:0 0 8px var(--green-glow);animation:blink 2s ease infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .h-equity{font-family:'JetBrains Mono';font-size:18px;font-weight:800;color:var(--text)}
        .h-equity-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono'}
        .h-ts{font-size:9px;color:var(--text3);font-family:'JetBrains Mono';margin-top:4px}

        /* HERO KPI STRIP */
        .kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0 8px}
        .kpi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center;position:relative;overflow:hidden}
        .kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:8px 8px 0 0}
        .kpi.green::after{background:var(--green)} .kpi.red::after{background:var(--red)} .kpi.yellow::after{background:var(--yellow)} .kpi.blue::after{background:var(--blue)} .kpi.cyan::after{background:var(--cyan)}
        .kpi-label{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.8px;text-transform:uppercase}
        .kpi-val{font-family:'JetBrains Mono';font-size:14px;font-weight:700;margin-top:1px}
        .kpi-sub{font-size:9px;color:var(--text3);font-family:'JetBrains Mono'}

        /* TABS */
        .tab-bar{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
        .tab-bar::-webkit-scrollbar{display:none}
        .tab-btn{flex:0 0 auto;padding:8px 14px;font-size:11px;font-weight:600;color:var(--text3);background:none;border:none;cursor:pointer;white-space:nowrap;position:relative;letter-spacing:.3px;transition:color .2s}
        .tab-btn.active{color:var(--cyan)}
        .tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:8px;right:8px;height:2px;background:linear-gradient(90deg,var(--cyan),var(--blue));border-radius:2px}
        .tab-btn .bdg{display:inline-flex;align-items:center;justify-content:center;min-width:15px;height:15px;padding:0 4px;font-size:8px;font-weight:700;border-radius:8px;margin-left:3px;color:#fff}
        .bdg-r{background:var(--red)} .bdg-y{background:var(--yellow);color:#000} .bdg-b{background:var(--blue)}

        /* CONTENT */
        .content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
        .tab-content{display:none;padding:12px 14px 90px}
        .tab-content.active{display:block}

        /* CARDS */
        .card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
        .card-glow-green{box-shadow:0 0 20px rgba(0,227,150,0.04)}
        .card-glow-red{box-shadow:0 0 20px rgba(255,69,96,0.04)}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
        .card-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase}
        .section-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin:16px 0 8px}
        .section-label:first-child{margin-top:0}

        /* GAUGE (canvas-drawn) */
        .gauge-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
        .gauge-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
        .gauge-canvas{display:block;margin:0 auto}
        .gauge-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;margin-top:6px}
        .gauge-value{font-family:'JetBrains Mono';font-size:16px;font-weight:700}
        .gauge-sub{font-size:10px;color:var(--text3)}

        /* SCORE DIAL */
        .score-dial-wrap{text-align:center;padding:10px 0}
        .score-dial-canvas{display:block;margin:0 auto}
        .score-big-num{font-family:'JetBrains Mono';font-size:36px;font-weight:900;margin-top:-8px}
        .score-direction{font-size:12px;font-weight:600;margin-top:2px}

        /* STAT GRID */
        .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .stat-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
        .stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px}
        .stat-label{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.6px;text-transform:uppercase}
        .stat-val{font-family:'JetBrains Mono';font-size:15px;font-weight:700;margin-top:2px}
        .stat-sub{font-size:10px;color:var(--text3)}

        /* MINI CHART IN CARD */
        .mini-chart{height:60px;width:100%;position:relative}
        .mini-chart canvas{width:100%!important;height:100%!important}

        /* ACTIONS */
        .action-card{background:var(--bg1);border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid var(--border);cursor:pointer;transition:background .12s}
        .action-card:active{background:var(--bg3)}
        .action-card.p-urgent{border-left-color:var(--red);background:linear-gradient(90deg,rgba(255,69,96,0.04),transparent)}
        .action-card.p-high{border-left-color:var(--orange)}
        .action-card.p-medium{border-left-color:var(--yellow)}
        .action-card.p-low{border-left-color:var(--blue)}
        .a-top{display:flex;align-items:center;gap:8px}
        .a-type{font-size:8px;font-weight:700;letter-spacing:.5px;padding:2px 6px;border-radius:4px;flex-shrink:0}
        .at-entry{background:var(--green-bg);color:var(--green);border:1px solid rgba(0,227,150,.2)}
        .at-exit{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,69,96,.2)}
        .at-verify{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(254,176,25,.2)}
        .at-monitor{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(0,143,251,.2)}
        .at-warning{background:var(--orange-bg);color:var(--orange);border:1px solid rgba(255,108,47,.2)}
        .at-review{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(119,93,208,.2)}
        .a-title{font-size:13px;font-weight:600;flex:1}
        .a-time{font-size:9px;color:var(--text3);font-family:'JetBrains Mono'}
        .a-summary{font-size:11px;color:var(--text2);margin-top:4px}
        .a-detail{font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:none;line-height:1.6}
        .action-card.expanded .a-detail{display:block}

        /* POSITION MONITORS */
        .mon-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;position:relative;overflow:hidden}
        .mon-bg-bar{position:absolute;top:0;left:0;bottom:0;opacity:.06;pointer-events:none;border-radius:12px}
        .mon-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative}
        .mon-ticker{font-weight:800;font-size:15px}
        .mon-type{font-size:11px;color:var(--text3)}
        .mon-pnl{font-family:'JetBrains Mono';font-size:15px;font-weight:700;text-align:right}
        .mon-pnl-pct{font-size:11px}
        /* SL ---|--- Current ---|--- TP bar */
        .range-bar{position:relative;height:20px;background:var(--bg0);border-radius:10px;margin:10px 0 4px;overflow:visible}
        .range-fill{position:absolute;top:0;height:100%;border-radius:10px}
        .range-marker{position:absolute;top:-2px;width:3px;height:24px;border-radius:2px;z-index:2}
        .range-labels{display:flex;justify-content:space-between;font-size:9px;font-family:'JetBrains Mono'}
        .mon-note{font-size:11px;color:var(--text3);margin-top:6px;font-style:italic}

        /* CHANGE FEED */
        .feed{padding-left:16px;position:relative}
        .feed::before{content:'';position:absolute;left:4px;top:8px;bottom:8px;width:1px;background:linear-gradient(180deg,var(--cyan),var(--blue),var(--purple),transparent)}
        .feed-item{position:relative;padding:6px 0 10px 14px}
        .feed-dot{position:absolute;left:-16px;top:10px;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg0)}
        .fd-trade{background:var(--green)} .fd-alert{background:var(--yellow)} .fd-risk{background:var(--red)}
        .fd-flow{background:var(--blue)} .fd-score{background:var(--purple)} .fd-market{background:var(--cyan)} .fd-position{background:var(--orange)}
        .feed-time{font-size:9px;color:var(--text3);font-family:'JetBrains Mono'}
        .feed-text{font-size:12px;color:var(--text);line-height:1.5}
        .feed-src{font-size:9px;color:var(--text3)}

        /* FLOW */
        .flow-filters{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
        .flow-filters::-webkit-scrollbar{display:none}
        .f-chip{padding:5px 12px;font-size:10px;font-weight:600;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s}
        .f-chip.active{background:var(--cyan-bg);color:var(--cyan);border-color:rgba(0,229,255,.3)}
        .flow-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
        .fc-head{padding:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start}
        .fc-head:active{background:var(--bg2)}
        .fc-left{flex:1}
        .fc-ticker{font-weight:800;font-size:16px}
        .fc-setup{font-size:12px;color:var(--text2);margin-top:1px}
        .fc-prem{font-size:10px;color:var(--text3);font-family:'JetBrains Mono';margin-top:2px}
        .fc-right{text-align:right;flex-shrink:0;min-width:60px}
        .fc-score{font-family:'JetBrains Mono';font-size:20px;font-weight:800}
        .fc-tier{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:3px}
        .tier-a{background:rgba(0,227,150,.12);color:var(--green);border:1px solid rgba(0,227,150,.25)}
        .tier-b{background:rgba(254,176,25,.12);color:var(--yellow);border:1px solid rgba(254,176,25,.25)}
        .tier-skip{background:rgba(91,107,138,.12);color:var(--text3);border:1px solid rgba(91,107,138,.25)}
        /* Score bar visual */
        .score-bar-wrap{margin-top:6px;height:4px;background:var(--bg0);border-radius:2px;overflow:hidden;position:relative}
        .score-bar-center{position:absolute;left:50%;top:0;width:1px;height:100%;background:var(--text3);opacity:.3}
        .score-bar-fill{position:absolute;top:0;height:100%;border-radius:2px;transition:width .3s}
        .fc-status{font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.3px}
        .st-filled{background:rgba(0,227,150,.12);color:var(--green)} .st-pending{background:rgba(254,176,25,.12);color:var(--yellow)}
        .st-queued{background:rgba(0,143,251,.12);color:var(--blue)} .st-watching{background:rgba(119,93,208,.12);color:var(--purple)}
        .st-skipped{background:rgba(91,107,138,.12);color:var(--text3)}
        .fc-body{display:none;border-top:1px solid var(--border);padding:12px}
        .flow-card.expanded .fc-body{display:block}
        .fc-section{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin:10px 0 6px}
        .fc-section:first-child{margin-top:0}
        .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
        .sc-row{display:flex;justify-content:space-between;padding:4px 8px;border-radius:4px;font-size:11px}
        .sc-row:nth-child(odd){background:rgba(11,17,33,.6)}
        .sc-lbl{color:var(--text2)} .sc-v{font-family:'JetBrains Mono';font-weight:600}
        .chain-box{background:var(--bg0);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px}
        .ch-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
        .ch-lbl{color:var(--text3)} .ch-val{color:var(--text);font-family:'JetBrains Mono'}
        .skip-box{font-size:12px;color:var(--text2);padding:10px;background:rgba(255,69,96,.04);border-radius:8px;border-left:2px solid var(--red)}
        .fc-chevron{color:var(--text3);font-size:11px;transition:transform .2s;display:inline-block}
        .flow-card.expanded .fc-chevron{transform:rotate(90deg)}

        /* OVERVIEW */
        .chart-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
        .chart-wrap{height:170px;position:relative}
        .chart-wrap canvas{width:100%!important;height:100%!important}

        /* PERFORMANCE */
        .perf-hero{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
        .ph-box{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
        .ph-val{font-family:'JetBrains Mono';font-size:20px;font-weight:800}
        .ph-label{font-size:9px;color:var(--text3);letter-spacing:.5px;margin-top:2px}
        .donut-wrap{width:80px;height:80px;margin:0 auto 4px}
        .donut-wrap canvas{width:100%!important;height:100%!important}
        .trade-row{display:flex;align-items:center;padding:7px 10px;border-radius:8px;margin-bottom:3px;font-size:12px}
        .trade-row:nth-child(odd){background:var(--bg1)}
        .tr-tk{font-weight:700;min-width:45px}
        .tr-type{color:var(--text3);flex:1;margin:0 6px;font-size:11px}
        .tr-score{font-family:'JetBrains Mono';font-size:10px;color:var(--text3);margin-right:8px}
        .tr-pnl{font-family:'JetBrains Mono';font-weight:700;min-width:55px;text-align:right}

        /* WATCHLIST */
        .wl-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer}
        .wl-card:active{background:var(--bg2)}
        .wl-header{display:flex;justify-content:space-between;align-items:flex-start}
        .wl-tk{font-weight:800;font-size:15px}
        .wl-setup{font-size:12px;color:var(--text2);margin-top:1px}
        .wl-src{font-size:9px;color:var(--text3);margin-top:2px}
        .wl-score{font-family:'JetBrains Mono';font-size:16px;font-weight:800}
        .wl-risk{font-size:10px;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono'}
        .wl-status{font-size:10px;font-weight:600;margin-top:3px}

        /* CATALYST */
        .cat-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(26,37,64,.6)}
        .cat-row:last-child{border-bottom:none}
        .cat-date{font-size:10px;color:var(--text3);font-family:'JetBrains Mono';min-width:48px;flex-shrink:0}
        .cat-icon{font-size:13px;flex-shrink:0}
        .cat-text{font-size:12px;color:var(--text2)}
        .cat-tk{font-weight:600;color:var(--text)}

        /* UTILS */
        .mono{font-family:'JetBrains Mono'} .up{color:var(--green)} .dn{color:var(--red)} .warn{color:var(--yellow)} .info{color:var(--blue)} .muted{color:var(--text3)} .cyn{color:var(--cyan)}
        .empty{text-align:center;padding:32px 16px;color:var(--text3)} .empty-icon{font-size:28px;margin-bottom:6px;opacity:.5} .empty-text{font-size:12px}

        @media(min-width:768px){.stat-grid,.gauge-row{grid-template-columns:repeat(4,1fr)}.score-grid{grid-template-columns:1fr 1fr 1fr 1fr}.kpi-strip{grid-template-columns:repeat(6,1fr)}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="h-row1">
            <div><span class="logo">RAYMON</span><span class="live-pip"></span><div class="h-ts" id="hTs"></div></div>
            <div style="text-align:right"><div class="h-equity" id="hEq"></div><div class="h-equity-sub" id="hEqSub"></div></div>
        </div>
        <div class="kpi-strip" id="kpiStrip"></div>
        <div class="tab-bar" id="tabBar">
            <button class="tab-btn active" data-tab="actions">Actions<span class="bdg bdg-r" id="bAct"></span></button>
            <button class="tab-btn" data-tab="overview">Overview</button>
            <button class="tab-btn" data-tab="flow">Flow<span class="bdg bdg-b" id="bFlow"></span></button>
            <button class="tab-btn" data-tab="positions">Positions</button>
            <button class="tab-btn" data-tab="perf">Performance</button>
            <button class="tab-btn" data-tab="watchlist">Watchlist<span class="bdg bdg-y" id="bWl"></span></button>
        </div>
    </div>
    <div class="content">
        <div class="tab-content active" id="tab-actions"></div>
        <div class="tab-content" id="tab-overview"></div>
        <div class="tab-content" id="tab-flow"></div>
        <div class="tab-content" id="tab-positions"></div>
        <div class="tab-content" id="tab-perf"></div>
        <div class="tab-content" id="tab-watchlist"></div>
    </div>

function renderHeader(){

    $('hTs').textContent=m.last_updated?`Updated ${ta(m.last_updated)}`:'';
    $('hEq').textContent=a.equity?fm(a.equity):'';
    const wPnl=b.weekly_pnl||0;

/* DRAW GAUGE (half-donut) */
function drawGauge(canvasId,pct,color,bg='#1a2540'){
    const c=document.getElementById(canvasId);if(!c)return;
    const ctx=c.getContext('2d'),w=c.width,h=c.height,cx=w/2,cy=h-4,r=Math.min(cx,cy)-8;
    ctx.clearRect(0,0,w,h);
    ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,2*Math.PI);ctx.lineWidth=10;ctx.strokeStyle=bg;ctx.lineCap='round';ctx.stroke();
    const angle=Math.PI+Math.PI*Math.min(pct,1);
    ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,angle);ctx.lineWidth=10;ctx.strokeStyle=color;ctx.lineCap='round';ctx.stroke();
    // glow
    ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,angle);ctx.lineWidth=14;ctx.strokeStyle=color.replace(')',',0.15)').replace('rgb','rgba');ctx.lineCap='round';ctx.stroke();
}

/* DRAW SCORE DIAL */
function drawScoreDial(canvasId,score,maxScore=10){
    const c=document.getElementById(canvasId);if(!c)return;
    const ctx=c.getContext('2d'),w=c.width,h=c.height,cx=w/2,cy=h-10,r=Math.min(cx,cy)-12;
    ctx.clearRect(0,0,w,h);
    // Background arc
    ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,2*Math.PI);ctx.lineWidth=14;ctx.strokeStyle='#1a2540';ctx.lineCap='round';ctx.stroke();
    // Gradient segments
    const segments=[
        {start:Math.PI,end:Math.PI*1.2,color:'#ff4560'},
        {start:Math.PI*1.2,end:Math.PI*1.4,color:'#feb019'},
        {start:Math.PI*1.4,end:Math.PI*1.6,color:'#5b6b8a'},
        {start:Math.PI*1.6,end:Math.PI*1.8,color:'#feb019'},
        {start:Math.PI*1.8,end:Math.PI*2,color:'#00e396'}
    ];
    for(const s of segments){ctx.beginPath();ctx.arc(cx,cy,r,s.start,s.end);ctx.lineWidth=14;ctx.strokeStyle=s.color+'40';ctx.lineCap='butt';ctx.stroke();}
    // Needle
    const norm=(score+maxScore)/(2*maxScore);
    const needleAngle=Math.PI+Math.PI*Math.max(0,Math.min(1,norm));
    const nx=cx+Math.cos(needleAngle)*(r-2),ny=cy+Math.sin(needleAngle)*(r-2);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(nx,ny);ctx.lineWidth=3;ctx.strokeStyle=Math.abs(score)>=5?'#00e396':Math.abs(score)>=3?'#feb019':'#5b6b8a';ctx.lineCap='round';ctx.stroke();
    // Center dot
    ctx.beginPath();ctx.arc(cx,cy,5,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
}

/* ACTIONS TAB */
function renderActions(){
    const actions=D.actions||[],changes=D.changes||[],positions=D.positions||[],score=D.latest_0dte_score||null;
    let h='';
    // 0DTE Score Dial
    if(score&&score.total!==undefined){
        const s=score.total,tier=score.tier||'',dir=score.direction||'';
        const sColor=Math.abs(s)>=5?'up':Math.abs(s)>=3?'warn':'muted';
        h+=`<div class="card" style="text-align:center">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span class="card-title">0DTE SCORE</span><span class="a-time">${score.timestamp?st(score.timestamp):''}</span></div>
            <div class="score-dial-wrap"><canvas id="scoreDial" width="200" height="110" class="score-dial-canvas"></canvas></div>
            <div class="score-big-num ${sColor}">${ps(s)}${Math.abs(s).toFixed(1)}</div>
            <div class="score-direction ${sColor}">${dir} — ${tier}</div>
            ${score.factors?`<div class="score-grid" style="margin-top:10px;text-align:left">${score.factors.map(f=>`<div class="sc-row"><span class="sc-lbl">${f.name}</span><span class="sc-v ${f.value>0?'up':f.value<0?'dn':'muted'}">${ps(f.value)}${f.value}</span></div>`).join('')}</div>`:''}
        </div>`;
    }
    // Urgent Actions
    const urgent=actions.filter(a=>a.priority==='urgent'||a.priority==='high');
    const other=actions.filter(a=>a.priority!=='urgent'&&a.priority!=='high');

    if(positions.length){

        h+=`<div class="section-label">ACTIVITY</div>`;
        h+=`<div class="feed">${changes.slice(0,25).map(mkFeed).join('')}</div>`;
    }

    const b=$('bAct');b.textContent=urgent.length||'';b.style.display=urgent.length?'inline-flex':'none';

function mkMonitor(p){

function mkFlow(f,i){
    const sc=f.score,sColor=sc!=null?(Math.abs(sc)>=5?'up':Math.abs(sc)>=3?'warn':'muted'):'muted';

        const maxSc=10;const pct=Math.abs(sc)/maxSc*50;
        const left=sc<0?`${50-pct}%`:'50%';

        const barColor=Math.abs(sc)>=5?'var(--green)':Math.abs(sc)>=3?'var(--yellow)':'var(--text3)';
        barHtml=`<div class="score-bar-wrap"><div class="score-bar-center"></div><div class="score-bar-fill" style="left:${left};width:${width};background:${barColor}"></div></div>`;
    }
    let body='';

        if(f.modifiers&&f.modifiers.length)body+=f.modifiers.map(m=>`<div class="sc-row" style="background:rgba(119,93,208,.08)"><span class="sc-lbl">${m.name}</span><span class="sc-v ${m.value>0?'up':m.value<0?'dn':'muted'}">${ps(m.value)}${m.value}</span></div>`).join('');
        body+=`</div>`;
    }
    if(f.analysis)body+=`<div class="fc-section">ANALYSIS</div><div style="font-size:12px;color:var(--text2);line-height:1.6">${f.analysis}</div>`;
    if(f.chain_rec){

        body+=`<div class="fc-section">CHAIN REC</div><div class="chain-box">`;
        const flds=[['Setup',cr.setup],['Entry',cr.entry],['SL',cr.sl],['TP1',cr.tp1],['TP2',cr.tp2],['BE',cr.be],['Risk',cr.risk],['R/R',cr.rr],['Delta',cr.delta],['Theta',cr.theta],['IV Rank',cr.iv_rank],['Max Pain',cr.max_pain],['Expiry',cr.expiry],['Time Stop',cr.time_stop]];

}

    h+=`<div class="chart-card"><div class="card-title" style="margin-bottom:8px">EQUITY CURVE</div><div style="height:170px"><canvas id="eqChart2"></canvas></div></div>`;
    // Recent trades
    h+=`<div class="card"><div class="card-title" style="margin-bottom:8px">TRADE LOG</div>`;
    if(!trades.length)h+=`<div class="muted" style="text-align:center;padding:16px">No trades yet</div>`;
    else h+=trades.slice(0,15).map(t=>`<div class="trade-row"><span class="tr-tk">${t.ticker||''}</span><span class="tr-type">${t.type||''}</span>${t.tier?`<span class="tr-score">${t.tier}</span>`:''}<span class="tr-pnl ${pc(t.pnl||0)}">${fp(t.pnl||0)}</span></div>`).join('');
    h+=`</div>`;
    $('tab-perf').innerHTML=h;
    setTimeout(()=>{
        // Donut
        const dc=document.getElementById('donutChart');
        if(dc){if(_donutChart)_donutChart.destroy();_donutChart=new Chart(dc,{type:'doughnut',data:{labels:['Wins','Losses'],datasets:[{data:[wins,losses],backgroundColor:['rgba(0,227,150,0.8)','rgba(255,69,96,0.8)'],borderColor:['#00e396','#ff4560'],borderWidth:2,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed}`}}}}});}
        // P&L per trade bar
        const pc2=document.getElementById('pnlChart');
        if(pc2){new Chart(pc2,{type:'bar',data:{labels:trades.slice(0,12).map(t=>t.ticker),datasets:[{data:trades.slice(0,12).map(t=>t.pnl||0),backgroundColor:trades.slice(0,12).map(t=>(t.pnl||0)>=0?'rgba(0,227,150,0.6)':'rgba(255,69,96,0.6)'),borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{grid:{color:'rgba(26,37,64,0.5)'},ticks:{color:'#5b6b8a',font:{size:8},callback:v=>`$${v}`}}}}});}
        // Equity
        const ec=document.getElementById('eqChart2');
        if(ec){const hist=(D.performance||{}).equity_history||[];new Chart(ec,{type:'line',data:{labels:hist.map(h=>h.date),datasets:[{data:hist.map(h=>h.equity),borderColor:'#00e5ff',backgroundColor:'rgba(0,229,255,0.06)',fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#00e5ff',pointBorderColor:'#060a13',pointBorderWidth:2,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(26,37,64,0.5)'},ticks:{color:'#5b6b8a',font:{size:9},maxRotation:0,maxTicksLimit:5}},y:{grid:{color:'rgba(26,37,64,0.5)'},ticks:{color:'#5b6b8a',font:{size:9},callback:v=>`$${(v/1000).toFixed(1)}K`}}}}});}
    },30);
}

/* WATCHLIST TAB */
function renderWatchlist(){
    const wl=D.watchlist||[];
    let h='';
    if(!wl.length){h=`<div class="empty"><div class="empty-icon">👁️</div><div class="empty-text">No watchlist items</div></div>`;$('tab-watchlist').innerHTML=h;return;}
    const sorted=[...wl].sort((a,b)=>{if(a.tier==='A'&&b.tier!=='A')return-1;if(b.tier==='A'&&a.tier!=='A')return 1;return Math.abs(b.score||0)-Math.abs(a.score||0)});
    h+=`<div class="section-label">${wl.length} CANDIDATES</div>`;
    h+=sorted.map(w=>{
        const sc=w.score,sColor=sc!=null?(Math.abs(sc)>=4?'up':Math.abs(sc)>=3?'warn':'muted'):'muted';
        const tCls=w.tier==='A'?'tier-a':w.tier==='B'?'tier-b':'tier-skip';
        return`<div class="wl-card"><div class="wl-header"><div><div style="display:flex;align-items:center;gap:8px"><span class="wl-tk">${w.ticker||''}</span>${w.tier?`<span class="fc-tier ${tCls}" style="font-size:8px">TIER ${w.tier}</span>`:''}</div><div class="wl-setup">${w.setup||''}</div><div class="wl-src">${w.source||''}</div></div><div style="text-align:right">${sc!=null?`<div class="wl-score ${sColor}">${ps(sc)}${Math.abs(sc).toFixed(1)}</div>`:''}<div class="wl-risk">${w.risk!=null?(typeof w.risk==='number'?fm(w.risk):w.risk):''}</div><div class="wl-status ${w.status==='QUEUED'?'warn':'muted'}">${w.status||''}</div></div></div></div>`;
    }).join('');
    $('tab-watchlist').innerHTML=h;
    const b=$('bWl');const ac=wl.filter(w=>w.tier==='A').length;
    b.textContent=ac||'';b.style.display=ac?'inline-flex':'none';
}

/* TAB SWITCHING */
document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
        btn.classList.add('active');
        const tab=btn.dataset.tab;
        document.getElementById(`tab-${tab}`).classList.add('active');
        if(tab==='perf')renderPerformance();
        if(tab==='overview')renderOverview();
        if(tab==='positions')renderPositions();
    });
});

/* INIT */
renderHeader();
renderActions();
renderFlow();
// Lazy: overview, positions, performance rendered on tab click
</script>
</body>
</html>

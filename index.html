<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #060a13 0%, #0a0f1a 100%);
            color: #e0e8f0;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* ===== HEADER & NAV ===== */
        header {
            background: rgba(13, 21, 38, 0.8);
            border-bottom: 1px solid #1a2540;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #00e5ff;
            letter-spacing: -0.5px;
        }

        .equity-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00e5ff;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .equity-value {
            color: #00e5ff;
            font-weight: 600;
        }

        .last-refresh {
            font-size: 10px;
            color: #4a6a9a;
            font-family: 'JetBrains Mono', monospace;
            text-align: right;
            line-height: 1.2;
        }

        .last-refresh-time {
            color: #6677aa;
            font-weight: 500;
        }

        .kpi-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1px;
            background: #1a2540;
            border-top: 1px solid #1a2540;
        }

        .kpi-item {
            background: rgba(13, 21, 38, 0.6);
            padding: 12px 16px;
            border-right: 1px solid #1a2540;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .kpi-item:last-child {
            border-right: none;
        }

        .kpi-label {
            font-size: 11px;
            color: #8899bb;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .kpi-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 600;
            color: #00e5ff;
            margin-top: 4px;
        }

        .kpi-value.positive { color: #00e396; }
        .kpi-value.negative { color: #ff4560; }

        .tab-bar {
            display: flex;
            gap: 0;
            background: rgba(13, 21, 38, 0.5);
            border-bottom: 1px solid #1a2540;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #8899bb;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: #00e5ff;
        }

        .tab-btn.active {
            color: #00e5ff;
            border-bottom-color: #00e5ff;
        }

        /* ===== MAIN CONTENT ===== */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            width: 100%;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== LAYOUT GRIDS ===== */
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .grid-3col {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .grid-4col {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .col-60-40 {
            display: grid;
            grid-template-columns: 60% 40%;
            gap: 24px;
        }

        .col-span-full {
            grid-column: 1 / -1;
        }

        /* ===== CARDS ===== */
        .card {
            background: rgba(13, 21, 38, 0.7);
            border: 1px solid #1a2540;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 229, 255, 0.05);
            transition: all 0.2s;
        }

        .card:hover {
            border-color: #2a3f5f;
            box-shadow: 0 8px 30px rgba(0, 229, 255, 0.1);
        }

        .card-title {
            font-size: 12px;
            color: #8899bb;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title-main {
            flex: 1;
        }

        .card-badge {
            font-size: 10px;
            background: rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            padding: 2px 6px;
            border-radius: 2px;
        }

        /* ===== SCORE DIAL (COMPACT) ===== */
        .score-dial-compact {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .dial-canvas {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }

        .score-info {
            flex: 1;
        }

        .score-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 700;
            color: #00e5ff;
            line-height: 1;
        }

        .score-label {
            font-size: 11px;
            color: #8899bb;
            margin-top: 8px;
        }

        .score-tier {
            display: inline-block;
            background: rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            margin-top: 8px;
        }

        /* ===== ACTION ITEMS ===== */
        .action-item {
            background: rgba(20, 30, 48, 0.5);
            border: 1px solid #1a2540;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-item:hover {
            border-color: #2a3f5f;
            background: rgba(20, 30, 48, 0.8);
        }

        .action-item.priority-high {
            border-left: 3px solid #ff4560;
        }

        .action-item.priority-medium {
            border-left: 3px solid #feb019;
        }

        .action-item.priority-low {
            border-left: 3px solid #00e396;
        }

        .action-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .action-title {
            font-size: 13px;
            font-weight: 600;
            color: #e0e8f0;
        }

        .action-ticker {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            background: rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            padding: 2px 6px;
            border-radius: 2px;
        }

        .action-summary {
            font-size: 12px;
            color: #8899bb;
        }

        .action-detail {
            display: none;
            font-size: 11px;
            color: #6677aa;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #1a2540;
            line-height: 1.4;
        }

        .action-item.expanded .action-detail {
            display: block;
        }

        /* ===== POSITION MONITOR ===== */
        .position-monitor {
            background: rgba(20, 30, 48, 0.5);
            border: 1px solid #1a2540;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .pos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .pos-ticker {
            font-weight: 600;
            color: #00e5ff;
        }

        .pos-price {
            color: #8899bb;
        }

        .pos-pnl {
            font-weight: 600;
        }

        .pos-pnl.positive { color: #00e396; }
        .pos-pnl.negative { color: #ff4560; }

        .pos-bar {
            height: 3px;
            background: #1a2540;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }

        .pos-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4560 0%, #feb019 50%, #00e396 100%);
            width: 50%;
        }

        /* ===== ACTIVITY FEED ===== */
        .activity-feed {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .activity-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 8px 0;
            border-bottom: 1px solid #1a2540;
            font-size: 12px;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00e5ff;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .activity-dot.trade { background: #00e396; }
        .activity-dot.alert { background: #ff4560; }
        .activity-dot.update { background: #feb019; }

        .activity-content {
            flex: 1;
        }

        .activity-time {
            color: #6677aa;
            font-size: 11px;
        }

        .activity-text {
            color: #8899bb;
        }

        /* ===== GAUGES ===== */
        .gauges-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }

        .gauge {
            text-align: center;
        }

        .gauge-canvas {
            width: 100%;
            max-width: 140px;
            height: 90px;
            margin: 0 auto 12px;
        }

        .gauge-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: #00e5ff;
        }

        .gauge-label {
            font-size: 11px;
            color: #8899bb;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== CHARTS ===== */
        .chart-container {
            position: relative;
            height: 320px;
            margin-bottom: 24px;
        }

        .chart-container.small {
            height: 200px;
        }

        /* ===== FLOW FILTERS ===== */
        .flow-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .flow-filter-btn {
            background: rgba(13, 21, 38, 0.7);
            border: 1px solid #1a2540;
            color: #8899bb;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .flow-filter-btn:hover {
            border-color: #2a3f5f;
            color: #e0e8f0;
        }

        .flow-filter-btn.active {
            background: rgba(0, 229, 255, 0.15);
            border-color: #00e5ff;
            color: #00e5ff;
        }

        .flow-filter-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            background: rgba(0, 229, 255, 0.2);
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 4px;
        }

        /* ===== FLOW CARDS ===== */
        .flow-card {
            background: rgba(13, 21, 38, 0.7);
            border: 1px solid #1a2540;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .flow-card:hover {
            border-color: #2a3f5f;
            background: rgba(13, 21, 38, 0.9);
        }

        .flow-card.status-filled { border-left: 3px solid #00e396; }
        .flow-card.status-pending { border-left: 3px solid #ffb300; }
        .flow-card.status-skipped { border-left: 3px solid #ff4560; opacity: 0.75; }
        .flow-card.status-watching { border-left: 3px solid #008ffb; }
        .flow-card.status-queued { border-left: 3px solid #9c27b0; }

        .flow-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .flow-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .flow-ticker {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 16px;
            color: #00e5ff;
        }

        .flow-tier-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 3px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .flow-tier-badge.tier-a {
            background: rgba(255, 179, 0, 0.2);
            color: #ffb300;
            border: 1px solid rgba(255, 179, 0, 0.4);
        }

        .flow-tier-badge.tier-b {
            background: rgba(0, 143, 251, 0.2);
            color: #008ffb;
            border: 1px solid rgba(0, 143, 251, 0.4);
        }

        .flow-tier-badge.tier-skip {
            background: rgba(255, 69, 96, 0.15);
            color: #ff6b7f;
            border: 1px solid rgba(255, 69, 96, 0.3);
        }

        .flow-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .flow-score-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .flow-score-badge.positive {
            background: rgba(0, 227, 150, 0.15);
            color: #00e396;
        }

        .flow-score-badge.negative {
            background: rgba(255, 69, 96, 0.15);
            color: #ff4560;
        }

        .flow-status-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 3px;
            letter-spacing: 0.3px;
        }

        .flow-status-badge.filled { background: rgba(0, 227, 150, 0.2); color: #00e396; }
        .flow-status-badge.pending { background: rgba(255, 179, 0, 0.2); color: #ffb300; }
        .flow-status-badge.skipped { background: rgba(255, 69, 96, 0.2); color: #ff4560; }
        .flow-status-badge.watching { background: rgba(0, 143, 251, 0.2); color: #008ffb; }
        .flow-status-badge.queued { background: rgba(156, 39, 176, 0.2); color: #ce93d8; }

        .flow-direction {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 3px;
        }

        .flow-direction.bullish {
            background: rgba(0, 227, 150, 0.2);
            color: #00e396;
        }

        .flow-direction.bearish {
            background: rgba(255, 69, 96, 0.2);
            color: #ff4560;
        }

        .flow-row2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .flow-setup {
            font-size: 12px;
            color: #8899bb;
        }

        .flow-source {
            font-size: 10px;
            font-weight: 600;
            color: #6677aa;
            background: rgba(0, 229, 255, 0.05);
            padding: 1px 6px;
            border-radius: 3px;
            border: 1px solid #1a2540;
        }

        .flow-bar {
            height: 3px;
            border-radius: 2px;
            margin-bottom: 8px;
            width: 100%;
        }

        .flow-bar.bullish { background: linear-gradient(90deg, #00e396 0%, #00e5ff 100%); }
        .flow-bar.bearish { background: linear-gradient(90deg, #ff4560 0%, #ff6b7f 100%); }

        .flow-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #6677aa;
            font-family: 'JetBrains Mono', monospace;
        }

        .flow-skip-reason {
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(255, 69, 96, 0.08);
            border: 1px solid rgba(255, 69, 96, 0.2);
            border-radius: 4px;
            font-size: 11px;
            color: #ff6b7f;
        }

        .flow-skip-reason strong { color: #ff4560; }

        .flow-expand-hint {
            text-align: center;
            font-size: 10px;
            color: #4a5a7a;
            margin-top: 6px;
        }

        .flow-card.expanded .flow-expand-hint { display: none; }

        .flow-analysis {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #1a2540;
        }

        .flow-card.expanded .flow-analysis {
            display: block;
        }

        .flow-section-title {
            font-size: 10px;
            font-weight: 700;
            color: #4a6a9a;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 12px 0 6px 0;
        }

        .flow-section-title:first-child { margin-top: 0; }

        .factor-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .factor-item {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid #1a2540;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        .factor-item.positive { border-color: rgba(0, 227, 150, 0.3); }
        .factor-item.negative { border-color: rgba(255, 69, 96, 0.3); }

        .factor-label {
            color: #8899bb;
            display: block;
            font-size: 9px;
        }

        .factor-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            display: block;
            margin-top: 2px;
        }

        .factor-value.positive { color: #00e396; }
        .factor-value.negative { color: #ff4560; }
        .factor-value.neutral { color: #6677aa; }

        .flow-modifiers {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .modifier-tag {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        .modifier-tag.positive {
            background: rgba(0, 227, 150, 0.1);
            color: #00e396;
            border: 1px solid rgba(0, 227, 150, 0.3);
        }

        .modifier-tag.negative {
            background: rgba(255, 69, 96, 0.1);
            color: #ff4560;
            border: 1px solid rgba(255, 69, 96, 0.3);
        }

        .chain-rec-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .chain-rec-item {
            background: rgba(0, 229, 255, 0.03);
            border: 1px solid #1a2540;
            padding: 6px 8px;
            border-radius: 4px;
        }

        .chain-rec-label {
            font-size: 9px;
            color: #4a6a9a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chain-rec-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: #e0e8f0;
            margin-top: 1px;
        }

        .flow-analysis-text {
            font-size: 11px;
            color: #8899bb;
            padding: 8px 0;
            border-top: 1px solid #1a2540;
            line-height: 1.6;
        }

        .flow-timestamp {
            font-size: 10px;
            color: #4a5a7a;
            font-family: 'JetBrains Mono', monospace;
            text-align: right;
            margin-top: 4px;
        }

        /* ===== POSITION CARDS ===== */
        .position-card {
            background: rgba(13, 21, 38, 0.7);
            border: 1px solid #1a2540;
            border-radius: 8px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        .position-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 227, 150, 0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .position-card.negative::before {
            background: linear-gradient(135deg, rgba(255, 69, 96, 0.05) 0%, transparent 100%);
        }

        .position-inner {
            position: relative;
            z-index: 1;
        }

        .pos-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .pos-name {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            color: #00e5ff;
        }

        .pos-type {
            font-size: 10px;
            color: #8899bb;
            background: rgba(0, 229, 255, 0.1);
            padding: 2px 6px;
            border-radius: 2px;
        }

        .pos-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        .pos-detail-item {
            display: flex;
            justify-content: space-between;
        }

        .pos-detail-label {
            color: #8899bb;
        }

        .pos-detail-value {
            color: #e0e8f0;
            font-weight: 600;
        }

        .pos-pnl-row {
            padding: 8px;
            background: rgba(0, 229, 255, 0.1);
            border-radius: 4px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .pos-pnl-value {
            font-size: 16px;
            font-weight: 700;
            color: #00e396;
        }

        .pos-pnl-value.negative { color: #ff4560; }

        .pos-pnl-label {
            font-size: 10px;
            color: #8899bb;
            margin-top: 2px;
        }

        const TABS = ['actions', 'overview', 'flow', 'positions', 'performance', 'watchlist'];

            renderHeader();

        function renderHeader() {
            const equity = D.account?.equity || 0;
            document.getElementById('equityValue').textContent = `$${formatNumber(equity)}`;

            // Last refresh timestamp
            var lastUpdated = D.meta?.last_updated;
            if (lastUpdated) {
                var d = new Date(lastUpdated);
                var timeStr = d.toLocaleString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true,timeZoneName:'short'});
                document.getElementById('lastRefresh').innerHTML = '<span style="color:#4a6a9a;">Last refresh</span><br><span class="last-refresh-time">' + timeStr + '</span>';
            }

            const kpiData = [
                { label: 'SPY', value: D.market?.spy_price || 0, format: 'price' },
                { label: 'VIX', value: D.market?.vix || 0, format: 'price' },
                { label: 'Heat', value: D.risk?.heat_pct || 0, format: 'percent' },
                { label: '0DTE Bdg', value: `${D.budgets?.dte_weekly_used || 0}/${D.budgets?.dte_weekly_limit || 600}`, format: 'text' },
                { label: 'Wk P&L', value: D.budgets?.weekly_pnl || 0, format: 'currency' },
                { label: 'Streak', value: `${D.risk?.current_streak_w || 0}W/${D.risk?.current_streak_l || 0}L`, format: 'text' }
            ];

            const kpiHTML = kpiData.map(kpi => `
                <div class="kpi-item">
                    <div>
                        <div class="kpi-label">${kpi.label}</div>
                        <div class="kpi-value ${getValueClass(kpi.value)}">${formatKPI(kpi.value, kpi.format)}</div>
                    </div>
                </div>
            `).join('');

            document.getElementById('kpiStrip').innerHTML = kpiHTML;

            const tabHTML = TABS.map(tab => `
                <button class="tab-btn ${tab === currentTab ? 'active' : ''}" data-tab="${tab}">
                    ${tab.charAt(0).toUpperCase() + tab.slice(1)}
                </button>
            `).join('');

            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = tabHTML;
            tabBar.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => switchTab(e.target.dataset.tab));
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            document.getElementById(tab + 'Tab').classList.add('active');
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            if (tab === 'overview') renderOverviewTab();
            else if (tab === 'flow') renderFlowTab();
            else if (tab === 'positions') renderPositionsTab();
            else if (tab === 'performance') renderPerformanceTab();

        function renderScoreDial(score) {
            const canvas = document.getElementById('dialCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const size = 120;
            canvas.width = size;
            canvas.height = size;

            const centerX = size / 2;
            const centerY = size / 2;
            const radius = 45;

            ctx.fillStyle = '#1a2540';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();

            const scoreNorm = Math.max(-10, Math.min(10, score.total || 0)) / 10;
            const angle = Math.PI + (scoreNorm * Math.PI);

            ctx.strokeStyle = scoreNorm > 0 ? '#00e396' : '#ff4560';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, angle);
            ctx.stroke();
        }

        function drawHalfDonutGauge(canvasId, value, max, color) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const size = canvas.offsetWidth || 140;
            canvas.width = size;
            canvas.height = 90;

            const centerX = size / 2;
            const centerY = size / 1.5;
            const radius = 35;

            ctx.fillStyle = '#1a2540';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, Math.PI * 2);
            ctx.fill();

            const percent = Math.min(value / max, 1);
            ctx.strokeStyle = color;
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, Math.PI + (Math.PI * percent));
            ctx.stroke();
        }

        function buildFlowCard(flow) {
            var status = (flow.status || 'PENDING').toUpperCase();
            var statusClass = status.toLowerCase().replace(/\s/g, '');
            var tierClass = flow.tier === 'A' ? 'tier-a' : (flow.tier === 'B' ? 'tier-b' : 'tier-skip');
            var tierLabel = flow.tier === 'A' ? 'TIER A' : (flow.tier === 'B' ? 'TIER B' : 'SKIP');
            var dirClass = flow.direction === 'BULLISH' ? 'bullish' : 'bearish';
            var scoreClass = flow.score > 0 ? 'positive' : 'negative';
            var absScore = Math.abs(flow.score || 0);
            var scoreStr = (flow.score > 0 ? '+' : '') + (flow.score || 0);
            var statusIcon = '';
            if (status === 'FILLED') statusIcon = '✅ ';
            else if (status === 'PENDING') statusIcon = '⏳ ';
            else if (status === 'SKIPPED') statusIcon = '❌ ';
            else if (status === 'WATCHING') statusIcon = '👁 ';
            else if (status === 'QUEUED') statusIcon = '📋 ';

            var ts = '';
            if (flow.timestamp) {
                var d = new Date(flow.timestamp);
                ts = d.toLocaleString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
            }

            var h = '<div class="flow-card status-' + statusClass + '" onclick="this.classList.toggle(\'expanded\')" data-status="' + status + '">';

            // Row 1: ticker + tier + score + status
            h += '<div class="flow-header">';
            h += '<div class="flow-header-left">';
            h += '<span class="flow-ticker">' + flow.ticker + '</span>';
            h += '<span class="flow-tier-badge ' + tierClass + '">' + tierLabel + '</span>';
            h += '<span class="flow-direction ' + dirClass + '">' + (flow.direction || 'N/A') + '</span>';
            h += '</div>';
            h += '<div class="flow-header-right">';
            h += '<span class="flow-score-badge ' + scoreClass + '">' + scoreStr + '</span>';
            h += '<span class="flow-status-badge ' + statusClass + '">' + statusIcon + status + '</span>';
            h += '</div>';
            h += '</div>';

            // Row 2: setup + source tag
            h += '<div class="flow-row2">';
            h += '<span class="flow-setup">' + (flow.setup || '') + '</span>';
            h += '<span class="flow-source">' + (flow.source || '') + '</span>';
            h += '</div>';

            // Color bar
            h += '<div class="flow-bar ' + dirClass + '"></div>';

            // Meta: premium + timestamp
            h += '<div class="flow-meta">';
            h += '<span>$' + formatNumber(flow.premium || 0) + ' premium</span>';
            h += '<span>' + ts + '</span>';
            h += '</div>';

            // Skip reason (if skipped)
            if (status === 'SKIPPED' && flow.skip_reason) {
                h += '<div class="flow-skip-reason"><strong>Skip:</strong> ' + flow.skip_reason + '</div>';

                h += '<div class="flow-section-title">Modifiers</div>';
                h += '<div class="flow-modifiers">' + buildModifierHtml(flow.modifiers) + '</div>';

        function setFlowFilter(filter, btn) {

        function renderFlowCards() {
            var flows = D.flow_alerts || [];
            var filtered = flows;
            if (_flowFilter !== 'ALL') {
                filtered = [];
                for (var i = 0; i < flows.length; i++) {
                    if ((flows[i].status || '').toUpperCase() === _flowFilter) filtered.push(flows[i]);
                }
            }
            // Sort: FILLED first, then PENDING, QUEUED, WATCHING, SKIPPED
            var order = {FILLED:0, PENDING:1, QUEUED:2, WATCHING:3, SKIPPED:4};
            filtered.sort(function(a, b) {
                var oa = order[(a.status||'').toUpperCase()] || 9;
                var ob = order[(b.status||'').toUpperCase()] || 9;
                if (oa !== ob) return oa - ob;
                return Math.abs(b.score||0) - Math.abs(a.score||0);
            });
            var cardsHtml = '';
            for (var i = 0; i < filtered.length; i++) {
                cardsHtml += buildFlowCard(filtered[i]);
            }
            document.getElementById('flowCards').innerHTML = cardsHtml || '<p style="color:#6677aa;text-align:center;padding:40px;">No alerts match this filter</p>';
        }

                                    <span class="pos-name">${pos.ticker}</span>
                                    <span class="pos-type">${pos.type || 'EQUITY'}</span>
                                </div>
                                <div class="pos-details">
                                    <div class="pos-detail-item">
                                        <span class="pos-detail-label">Entry</span>
                                        <span class="pos-detail-value">${formatNumber(pos.entry || 0)}</span>
                                    </div>
                                    <div class="pos-detail-item">
                                        <span class="pos-detail-label">Current</span>
                                        <span class="pos-detail-value">${formatNumber(pos.current_price || pos.mark || 0)}</span>
                                    </div>
                                    <div class="pos-detail-item">
                                        <span class="pos-detail-label">Size</span>
                                        <span class="pos-detail-value">${pos.size || '—'}</span>
                                    </div>
                                    <div class="pos-detail-item">
                                        <span class="pos-detail-label">Status</span>
                                        <span class="pos-detail-value">${pos.status || '—'}</span>
                                    </div>
                                </div>
                                <div class="pos-pnl-row">
                                    <div class="pos-pnl-value ${(pos.pnl || 0) < 0 ? 'negative' : ''}">
                                        ${(pos.pnl || 0) > 0 ? '+' : ''}${formatNumber(pos.pnl || 0)}
                                    </div>
                                    <div class="pos-pnl-label">${(pos.pnl_pct || 0) > 0 ? '+' : ''}${(pos.pnl_pct || 0).toFixed(1)}%</div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            document.getElementById('positionsTab').innerHTML = html;

            setTimeout(() => {
                renderPnLChart(pnlData);
            }, 100);
        }

        function renderPnLChart(data) {
            if (chartInstances.pnlChart) chartInstances.pnlChart.destroy();

            const ctx = document.getElementById('pnlChart').getContext('2d');
            // Use P&L % for chart scale so HOOD doesn't dominate
            const positions = D.positions || [];
            const pctData = positions.map(p => ({ label: p.ticker, pct: p.pnl_pct || 0, dollar: p.pnl || 0 }));

            chartInstances.pnlChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: pctData.map(d => d.label),
                    datasets: [{
                        label: 'P&L %',
                        data: pctData.map(d => d.pct),
                        backgroundColor: pctData.map(d => d.pct >= 0 ? '#00e396' : '#ff4560'),
                        borderRadius: 4,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    const d = pctData[ctx.dataIndex];
                                    return `${d.pct > 0 ? '+' : ''}${d.pct.toFixed(1)}%  ($${d.dollar > 0 ? '+' : ''}${d.dollar.toLocaleString()})`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: '#1a2540' },
                            ticks: {
                                color: '#8899bb',
                                font: { family: 'JetBrains Mono' },
                                callback: v => v + '%'
                            }
                        },
                        x: { grid: { display: false }, ticks: { color: '#8899bb' } }
                    }
                }
            });
        }

        function renderPerformanceTab() {
            const stats = D.performance?.stats || {};
            const tierA = stats.dte_tier_a || stats.tier_a_0dte || { wins: 0, losses: 0, total_pnl: 0 };
            const tierB = stats.dte_tier_b || stats.tier_b_0dte || { wins: 0, losses: 0, total_pnl: 0 };
            const swingA = stats.swing_tier_a || { wins: 0, losses: 0, total_pnl: 0 };
            const swingB = stats.swing_tier_b || { wins: 0, losses: 0, total_pnl: 0 };
            const totalWins = tierA.wins + tierB.wins + swingA.wins + swingB.wins;
            const totalLosses = tierA.losses + tierB.losses + swingA.losses + swingB.losses;

            const html = `
                <div class="grid-3col" style="margin-bottom: 24px;">
                    <div class="card text-center">
                        <div class="card-title">Total P&L</div>
                        <div style="font-family: JetBrains Mono; font-size: 32px; font-weight: 700; color: #00e396; margin: 12px 0;">
                            +${formatNumber(D.budgets?.weekly_pnl || 0)}
                        </div>
                        <div style="font-size: 12px; color: #8899bb;">This Week</div>
                    </div>
                    <div class="card text-center">
                        <div class="card-title">Win Rate</div>
                        <div style="font-family: JetBrains Mono; font-size: 32px; font-weight: 700; color: #00e5ff; margin: 12px 0;">
                            ${(totalWins / Math.max(1, totalWins + totalLosses) * 100).toFixed(0)}%
                        </div>
                        <div style="font-size: 12px; color: #8899bb;">All Trades</div>
                    </div>
                    <div class="card text-center">
                        <div class="card-title">Current Streak</div>
                        <div style="font-family: JetBrains Mono; font-size: 32px; font-weight: 700; color: #feb019; margin: 12px 0;">
                            ${D.risk?.current_streak_w || 0}W
                        </div>
                        <div style="font-size: 12px; color: #8899bb;">Wins</div>
                    </div>
                </div>

                <div class="grid-2col" style="margin-bottom: 24px;">
                    <div class="card">
                        <div class="card-title">P&L Distribution</div>
                        <canvas id="pnlDistChart" style="max-height: 200px;"></canvas>
                    </div>
                    <div class="card">
                        <div class="card-title">Weekly P&L</div>
                        <canvas id="weeklyChart" style="max-height: 200px;"></canvas>
                    </div>
                </div>

                <div class="card col-span-full">
                    <div class="card-title">Tier Performance</div>
                    <div class="tier-item">
                        <span class="tier-name">0DTE Tier A (±5+)</span>
                        <div class="tier-stats">
                            <div class="tier-stat"><span class="tier-label">W:</span><span class="tier-value">${tierA.wins || 0}</span></div>
                            <div class="tier-stat"><span class="tier-label">L:</span><span class="tier-value">${tierA.losses || 0}</span></div>
                            <div class="tier-stat"><span class="tier-label">P&L:</span><span class="tier-value" style="color: ${(tierA.total_pnl||0) >= 0 ? '#00e396' : '#ff4560'};">${(tierA.total_pnl||0) >= 0 ? '+' : ''}${formatNumber(tierA.total_pnl || 0)}</span></div>
                        </div>
                    </div>
                    <div class="tier-item">
                        <span class="tier-name">0DTE Tier B (±3-4)</span>
                        <div class="tier-stats">
                            <div class="tier-stat"><span class="tier-label">W:</span><span class="tier-value">${tierB.wins || 0}</span></div>
                            <div class="tier-stat"><span class="tier-label">L:</span><span class="tier-value">${tierB.losses || 0}</span></div>
                            <div class="tier-stat"><span class="tier-label">P&L:</span><span class="tier-value" style="color: ${(tierB.total_pnl||0) >= 0 ? '#00e396' : '#ff4560'};">${(tierB.total_pnl||0) >= 0 ? '+' : ''}${formatNumber(tierB.total_pnl || 0)}</span></div>
                        </div>
                    </div>
                    <div class="tier-item">
                        <span class="tier-name">Swing Tier A (±4+)</span>
                        <div class="tier-stats">
                            <div class="tier-stat"><span class="tier-label">W:</span><span class="tier-value">${swingA.wins || 0}</span></div>
                            <div class="tier-stat"><span class="tier-label">L:</span><span class="tier-value">${swingA.losses || 0}</span></div>
                            <div class="tier-stat"><span class="tier-label">P&L:</span><span class="tier-value" style="color: ${(swingA.total_pnl||0) >= 0 ? '#00e396' : '#ff4560'};">${(swingA.total_pnl||0) >= 0 ? '+' : ''}${formatNumber(swingA.total_pnl || 0)}</span></div>
                        </div>
                    </div>
                    <div class="tier-item">
                        <span class="tier-name">Swing Tier B (±3)</span>
                        <div class="tier-stats">
                            <div class="tier-stat"><span class="tier-label">W:</span><span class="tier-value">${swingB.wins || 0}</span></div>
                            <div class="tier-stat"><span class="tier-label">L:</span><span class="tier-value">${swingB.losses || 0}</span></div>
                            <div class="tier-stat"><span class="tier-label">P&L:</span><span class="tier-value" style="color: ${(swingB.total_pnl||0) >= 0 ? '#00e396' : '#ff4560'};">${(swingB.total_pnl||0) >= 0 ? '+' : ''}${formatNumber(swingB.total_pnl || 0)}</span></div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('performanceTab').innerHTML = html;

            setTimeout(() => {
                renderPnLDistChart();
                renderWeeklyChart();
            }, 100);
        }

        function renderPnLDistChart() {
            if (chartInstances.pnlDistChart) chartInstances.pnlDistChart.destroy();

            const stats = D.performance?.stats || {};
            const allTiers = [
                stats.dte_tier_a || stats.tier_a_0dte || {},
                stats.dte_tier_b || stats.tier_b_0dte || {},
                stats.swing_tier_a || {},
                stats.swing_tier_b || {}
            ];
            const totalW = allTiers.reduce((s, t) => s + (t.wins || 0), 0);
            const totalL = allTiers.reduce((s, t) => s + (t.losses || 0), 0);

            const ctx = document.getElementById('pnlDistChart').getContext('2d');
            chartInstances.pnlDistChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Wins', 'Losses'],
                    datasets: [{
                        data: [totalW || 0, totalL || 0],
                        backgroundColor: ['#00e396', '#ff4560']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#8899bb' } } }
                }
            });
        }

        function renderWeeklyChart() {
            if (chartInstances.weeklyChart) chartInstances.weeklyChart.destroy();

            const ctx = document.getElementById('weeklyChart').getContext('2d');
            const history = D.performance?.weekly_pnl_history || [{ week: 'W1', pnl: 0 }];

            chartInstances.weeklyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: history.map(h => h.week),
                    datasets: [{
                        label: 'P&L',
                        data: history.map(h => h.pnl),
                        backgroundColor: history.map(h => h.pnl >= 0 ? '#00e396' : '#ff4560')
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#1a2540' }, ticks: { color: '#8899bb' } },
                        x: { grid: { display: false }, ticks: { color: '#8899bb' } }
                    }
                }
            });
        }

        function renderWatchlistTab() {
            const watchlist = D.watchlist || [];
            const html = watchlist.slice(0, 12).map(item => `
                <div class="watchlist-card">
                    <div class="watchlist-ticker">${item.ticker}</div>
                    <div class="watchlist-setup">${item.setup || ''}</div>
                    <div class="watchlist-footer">
                        <span class="watchlist-score">${item.score > 0 ? '+' : ''}${item.score || 0}</span>
                        <span class="watchlist-source">${item.source || 'SCAN'}</span>
                    </div>
                </div>
            `).join('');

            document.getElementById('watchlistTab').innerHTML = `
                <div class="grid-3col">
                    ${html}
                </div>
            ` || '<p style="color: #6677aa;">No watchlist items</p>';
        }

        function setupTabs() {
            // Tabs already set up in renderHeader
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toFixed(2);
        }

        function formatKPI(value, format) {
            if (format === 'price') return value.toFixed(2);
            if (format === 'currency') return `$${value >= 0 ? '+' : ''}${formatNumber(value)}`;
            if (format === 'percent') return value.toFixed(1) + '%';
            return value;
        }

        function getValueClass(value) {
            if (typeof value === 'number') {
                if (value > 0) return 'positive';
                if (value < 0) return 'negative';
            }
            return 'neutral';
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #060a13 0%, #0a0f1a 100%);
            color: #e0e8f0;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* ===== HEADER & NAV ===== */
        header {
            background: rgba(13, 21, 38, 0.8);
            border-bottom: 1px solid #1a2540;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #00e5ff;
            letter-spacing: -0.5px;
        }

        .equity-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00e5ff;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .equity-value {
            color: #00e5ff;
            font-weight: 600;
        }

        .kpi-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1px;
            background: #1a2540;
            border-top: 1px solid #1a2540;
        }

        .kpi-item {
            background: rgba(13, 21, 38, 0.6);
            padding: 12px 16px;
            border-right: 1px solid #1a2540;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .kpi-item:last-child {
            border-right: none;
        }

        .kpi-label {
            font-size: 11px;
            color: #8899bb;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .kpi-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 600;
            color: #00e5ff;
            margin-top: 4px;
        }

        .kpi-value.positive { color: #00e396; }
        .kpi-value.negative { color: #ff4560; }

        .tab-bar {
            display: flex;
            gap: 0;
            background: rgba(13, 21, 38, 0.5);
            border-bottom: 1px solid #1a2540;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #8899bb;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: #00e5ff;
        }

        .tab-btn.active {
            color: #00e5ff;
            border-bottom-color: #00e5ff;
        }

        /* ===== MAIN CONTENT ===== */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            width: 100%;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== LAYOUT GRIDS ===== */
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .grid-3col {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .grid-4col {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .col-60-40 {
            display: grid;
            grid-template-columns: 60% 40%;
            gap: 24px;
        }

        .col-span-full {
            grid-column: 1 / -1;
        }

        /* ===== CARDS ===== */
        .card {
            background: rgba(13, 21, 38, 0.7);
            border: 1px solid #1a2540;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 229, 255, 0.05);
            transition: all 0.2s;
        }

        .card:hover {
            border-color: #2a3f5f;
            box-shadow: 0 8px 30px rgba(0, 229, 255, 0.1);
        }

        .card-title {
            font-size: 12px;
            color: #8899bb;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title-main {
            flex: 1;
        }

        .card-badge {
            font-size: 10px;
            background: rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            padding: 2px 6px;
            border-radius: 2px;
        }

        /* ===== SCORE DIAL (COMPACT) ===== */
        .score-dial-compact {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .dial-canvas {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }

        .score-info {
            flex: 1;
        }

        .score-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 700;
            color: #00e5ff;
            line-height: 1;
        }

        .score-label {
            font-size: 11px;
            color: #8899bb;
            margin-top: 8px;
        }

        .score-tier {
            display: inline-block;
            background: rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            margin-top: 8px;
        }

        /* ===== ACTION ITEMS ===== */
        .action-item {
            background: rgba(20, 30, 48, 0.5);
            border: 1px solid #1a2540;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-item:hover {
            border-color: #2a3f5f;
            background: rgba(20, 30, 48, 0.8);
        }

        .action-item.priority-high {
            border-left: 3px solid #ff4560;
        }

        .action-item.priority-medium {
            border-left: 3px solid #feb019;
        }

        .action-item.priority-low {
            border-left: 3px solid #00e396;
        }

        .action-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .action-title {
            font-size: 13px;
            font-weight: 600;
            color: #e0e8f0;
        }

        .action-ticker {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            background: rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            padding: 2px 6px;
            border-radius: 2px;
        }

        .action-summary {
            font-size: 12px;
            color: #8899bb;
        }

        .action-detail {
            display: none;
            font-size: 11px;
            color: #6677aa;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #1a2540;
            line-height: 1.4;
        }

        .action-item.expanded .action-detail {
            display: block;
        }

        /* ===== POSITION MONITOR ===== */
        .position-monitor {
            background: rgba(20, 30, 48, 0.5);
            border: 1px solid #1a2540;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .pos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .pos-ticker {
            font-weight: 600;
            color: #00e5ff;
        }

        .pos-price {
            color: #8899bb;
        }

        .pos-pnl {
            font-weight: 600;
        }

        .pos-pnl.positive { color: #00e396; }
        .pos-pnl.negative { color: #ff4560; }

        .pos-bar {
            height: 3px;
            background: #1a2540;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }

        .pos-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4560 0%, #feb019 50%, #00e396 100%);
            width: 50%;
        }

        /* ===== ACTIVITY FEED ===== */
        .activity-feed {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .activity-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 8px 0;
            border-bottom: 1px solid #1a2540;
            font-size: 12px;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00e5ff;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .activity-dot.trade { background: #00e396; }
        .activity-dot.alert { background: #ff4560; }
        .activity-dot.update { background: #feb019; }

        .activity-content {
            flex: 1;
        }

        .activity-time {
            color: #6677aa;
            font-size: 11px;
        }

        .activity-text {
            color: #8899bb;
        }

        /* ===== GAUGES ===== */
        .gauges-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }

        .gauge {
            text-align: center;
        }

        .gauge-canvas {
            width: 100%;
            max-width: 140px;
            height: 90px;
            margin: 0 auto 12px;
        }

        .gauge-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: #00e5ff;
        }

        .gauge-label {
            font-size: 11px;
            color: #8899bb;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== CHARTS ===== */
        .chart-container {
            position: relative;
            height: 320px;
            margin-bottom: 24px;
        }

        .chart-container.small {
            height: 200px;
        }

        /* ===== FLOW CARDS ===== */
        .flow-card {
            background: rgba(13, 21, 38, 0.7);
            border: 1px solid #1a2540;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .flow-card:hover {
            border-color: #2a3f5f;
            background: rgba(13, 21, 38, 0.9);
        }

        .flow-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .flow-ticker {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            color: #00e5ff;
        }

        .flow-direction {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 3px;
        }

        .flow-direction.bullish {
            background: rgba(0, 227, 150, 0.2);
            color: #00e396;
        }

        .flow-direction.bearish {
            background: rgba(255, 69, 96, 0.2);
            color: #ff4560;
        }

        .flow-setup {
            font-size: 12px;
            color: #8899bb;
            margin-bottom: 8px;
        }

        .flow-bar {
            height: 4px;
            background: linear-gradient(90deg, #008ffb 0%, #00e5ff 100%);
            border-radius: 2px;
            margin-bottom: 8px;
            width: 100%;
        }

        .flow-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #6677aa;
            font-family: 'JetBrains Mono', monospace;
        }

        .flow-analysis {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #1a2540;
        }

        .flow-card.expanded .flow-analysis {
            display: block;
        }

        .factor-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .factor-item {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid #1a2540;
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        .factor-label {
            color: #8899bb;
            display: block;
        }

        .factor-value {
            color: #00e5ff;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            display: block;
            margin-top: 2px;
        }

        /* ===== POSITION CARDS ===== */
        .position-card {
            background: rgba(13, 21, 38, 0.7);
            border: 1px solid #1a2540;
            border-radius: 8px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        .position-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 227, 150, 0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .position-card.negative::before {
            background: linear-gradient(135deg, rgba(255, 69, 96, 0.05) 0%, transparent 100%);
        }

        .position-inner {
            position: relative;
            z-index: 1;
        }

        .pos-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .pos-name {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            color: #00e5ff;
        }

        .pos-type {
            font-size: 10px;
            color: #8899bb;
            background: rgba(0, 229, 255, 0.1);
            padding: 2px 6px;
            border-radius: 2px;
        }

        .pos-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        .pos-detail-item {
            display: flex;
            justify-content: space-between;
        }

        .pos-detail-label {
            color: #8899bb;
        }

        .pos-detail-value {
            color: #e0e8f0;
            font-weight: 600;
        }

        .pos-pnl-row {
            padding: 8px;
            background: rgba(0, 229, 255, 0.1);
            border-radius: 4px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .pos-pnl-value {
            font-size: 16px;
            font-weight: 700;
            color: #00e396;
        }

        .pos-pnl-value.negative { color: #ff4560; }

        .pos-pnl-label {
            font-size: 10px;
            color: #8899bb;
            margin-top: 2px;
        }

        /* ===== TIER BREAKDOWN ===== */
        .tier-item {
            background: rgba(20, 30, 48, 0.5);
            border: 1px solid #1a2540;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tier-name {
            font-weight: 600;
            color: #e0e8f0;
        }

        .tier-stats {
            display: flex;
            gap: 16px;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .tier-stat {
            display: flex;
            gap: 4px;
        }

        .tier-label {
            color: #8899bb;
        }

        .tier-value {
            color: #00e5ff;
            font-weight: 600;
        }

        /* ===== WATCHLIST CARDS ===== */
        .watchlist-card {
            background: rgba(13, 21, 38, 0.7);
            border: 1px solid #1a2540;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .watchlist-ticker {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            color: #00e5ff;
            margin-bottom: 8px;
        }

        .watchlist-setup {
            font-size: 12px;
            color: #8899bb;
            margin-bottom: 8px;
            flex: 1;
        }

        .watchlist-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }

        .watchlist-score {
            background: rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            padding: 2px 8px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        .watchlist-source {
            color: #6677aa;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            main {
                padding: 16px;
            }

            .grid-4col {
                grid-template-columns: repeat(2, 1fr);
            }

            .gauges-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid-2col,
            .col-60-40 {
                grid-template-columns: 1fr;
            }

            .score-dial-compact {
                flex-direction: column;
                text-align: center;
            }

            .factor-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            main {
                padding: 16px;
            }

            .header-top {
                padding: 12px 16px;
            }

            .kpi-strip {
                grid-template-columns: repeat(2, 1fr);
                gap: 0;
            }

            .kpi-item {
                flex-direction: column;
                padding: 8px;
                text-align: center;
            }

            .tab-bar {
                padding: 0 16px;
                overflow-x: auto;
            }

            .grid-3col {
                grid-template-columns: 1fr;
            }

            .grid-2col,
            .grid-4col,
            .col-60-40 {
                grid-template-columns: 1fr;
            }

            .gauges-row {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 16px;
            }

            .score-number {
                font-size: 36px;
            }

            .factor-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .score-dial-compact {
                flex-direction: column;
                text-align: center;
            }
        }

        /* ===== UTILITIES ===== */
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .mt-12 { margin-top: 12px; }
        .mt-24 { margin-top: 24px; }
        .gap-12 { gap: 12px; }
        .hidden { display: none !important; }
    </style>
</head>

        const TABS = ['actions', 'overview', 'flow', 'positions', 'performance', 'watchlist'];
        let currentTab = 'actions';
        let chartInstances = {};

        function init() {
            renderHeader();
            renderActionsTab();
            setupTabs();
        }

        function renderHeader() {
            const equity = D.account?.equity || 0;
            document.getElementById('equityValue').textContent = `$${formatNumber(equity)}`;

            const kpiData = [
                { label: 'SPY', value: D.market?.spy_price || 0, format: 'price' },
                { label: 'VIX', value: D.market?.vix || 0, format: 'price' },
                { label: 'Heat', value: D.risk?.heat_pct || 0, format: 'percent' },
                { label: '0DTE Bdg', value: `${D.budgets?.dte_weekly_used || 0}/${D.budgets?.dte_weekly_limit || 600}`, format: 'text' },
                { label: 'Wk P&L', value: D.budgets?.weekly_pnl || 0, format: 'currency' },
                { label: 'Streak', value: `${D.risk?.current_streak_w || 0}W/${D.risk?.current_streak_l || 0}L`, format: 'text' }
            ];

            const kpiHTML = kpiData.map(kpi => `
                <div class="kpi-item">
                    <div>
                        <div class="kpi-label">${kpi.label}</div>
                        <div class="kpi-value ${getValueClass(kpi.value)}">${formatKPI(kpi.value, kpi.format)}</div>
                    </div>
                </div>
            `).join('');

            document.getElementById('kpiStrip').innerHTML = kpiHTML;

            const tabHTML = TABS.map(tab => `
                <button class="tab-btn ${tab === currentTab ? 'active' : ''}" data-tab="${tab}">
                    ${tab.charAt(0).toUpperCase() + tab.slice(1)}
                </button>
            `).join('');

            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = tabHTML;
            tabBar.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => switchTab(e.target.dataset.tab));
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            document.getElementById(tab + 'Tab').classList.add('active');
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            if (tab === 'overview') renderOverviewTab();
            else if (tab === 'flow') renderFlowTab();
            else if (tab === 'positions') renderPositionsTab();
            else if (tab === 'performance') renderPerformanceTab();
            else if (tab === 'watchlist') renderWatchlistTab();
        }

        function renderActionsTab() {
            const score = D.latest_0dte_score || { total: 0, direction: 'NEUTRAL', tier: 'B' };
            const actions = D.actions || [];
            const changes = D.changes || [];

            const html = `
                <div class="col-60-40">
                    <div>
                        <div class="card">
                            <div class="card-title">
                                <span class="card-title-main">0DTE Score</span>
                                <span class="card-badge">${score.tier || 'B'}</span>
                            </div>
                            <div class="score-dial-compact">
                                <canvas id="dialCanvas" class="dial-canvas"></canvas>
                                <div class="score-info">
                                    <div class="score-number">${score.total > 0 ? '+' : ''}${score.total || 0}</div>
                                    <div class="score-label">${score.direction || 'NEUTRAL'}</div>
                                    <div class="score-tier">${score.tier || 'B'}</div>
                                </div>
                            </div>
                        </div>

                        <div class="card mt-12">
                            <div class="card-title">Action Items</div>
                            <div id="actionsList"></div>
                        </div>
                    </div>

                    <div>
                        <div class="card">
                            <div class="card-title">Position Monitors</div>
                            <div id="positionMonitors"></div>
                        </div>

                        <div class="card mt-12">
                            <div class="card-title">Activity Feed</div>
                            <div class="activity-feed" id="activityFeed"></div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('actionsTab').innerHTML = html;
            renderScoreDial(score);
            renderActionsList(actions);
            renderPositionMonitors();
            renderActivityFeed(changes);
        }

        function renderScoreDial(score) {
            const canvas = document.getElementById('dialCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const size = 120;
            canvas.width = size;
            canvas.height = size;

            const centerX = size / 2;
            const centerY = size / 2;
            const radius = 45;

            ctx.fillStyle = '#1a2540';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();

            const scoreNorm = Math.max(-10, Math.min(10, score.total || 0)) / 10;
            const angle = Math.PI + (scoreNorm * Math.PI);

            ctx.strokeStyle = scoreNorm > 0 ? '#00e396' : '#ff4560';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, angle);
            ctx.stroke();
        }

        function renderActionsList(actions) {
            const html = actions.slice(0, 8).map((action, i) => `

                        <div style="font-size: 11px; color: #6677aa;">

            document.getElementById('overviewTab').innerHTML = html;

            setTimeout(() => {

                drawHalfDonutGauge('marginGauge', margin, 100, '#00e396');
                drawHalfDonutGauge('dteGauge', (dte / dteLimit) * 100, 100, '#feb019');

        function drawHalfDonutGauge(canvasId, value, max, color) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const size = canvas.offsetWidth || 140;
            canvas.width = size;
            canvas.height = 90;

            const centerX = size / 2;
            const centerY = size / 1.5;
            const radius = 35;

            ctx.fillStyle = '#1a2540';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, Math.PI * 2);
            ctx.fill();

            const percent = Math.min(value / max, 1);
            ctx.strokeStyle = color;
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, Math.PI + (Math.PI * percent));
            ctx.stroke();
        }

        function renderEquityChart() {
            const history = D.performance?.equity_history || [{ date: 'N/A', equity: D.account?.equity || 0 }];

            if (chartInstances.equityChart) chartInstances.equityChart.destroy();

            const ctx = document.getElementById('equityChart').getContext('2d');
            chartInstances.equityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Equity',
                        data: data,
                        borderColor: '#00e5ff',
                        backgroundColor: 'rgba(0, 229, 255, 0.1)',

                        fill: true,

        function renderPositionsTab() {
            const positions = D.positions || [];

        function renderPnLChart(data) {
            if (chartInstances.pnlChart) chartInstances.pnlChart.destroy();

            const ctx = document.getElementById('pnlChart').getContext('2d');
            // Use P&L % for chart scale so HOOD doesn't dominate
            const positions = D.positions || [];
            const pctData = positions.map(p => ({ label: p.ticker, pct: p.pnl_pct || 0, dollar: p.pnl || 0 }));

            chartInstances.pnlChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: pctData.map(d => d.label),

                        label: 'P&L %',

                    responsive: true,
                    maintainAspectRatio: false,

                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    const d = pctData[ctx.dataIndex];
                                    return `${d.pct > 0 ? '+' : ''}${d.pct.toFixed(1)}%  ($${d.dollar > 0 ? '+' : ''}${d.dollar.toLocaleString()})`;
                                }

                        y: {
                            grid: { color: '#1a2540' },
                            ticks: {
                                color: '#8899bb',
                                font: { family: 'JetBrains Mono' },
                                callback: v => v + '%'

                        },
                        x: { grid: { display: false }, ticks: { color: '#8899bb' } }

        function renderPerformanceTab() {
            const stats = D.performance?.stats || {};
            const tierA = stats.dte_tier_a || stats.tier_a_0dte || { wins: 0, losses: 0, total_pnl: 0 };
            const tierB = stats.dte_tier_b || stats.tier_b_0dte || { wins: 0, losses: 0, total_pnl: 0 };
            const swingA = stats.swing_tier_a || { wins: 0, losses: 0, total_pnl: 0 };
            const swingB = stats.swing_tier_b || { wins: 0, losses: 0, total_pnl: 0 };
            const totalWins = tierA.wins + tierB.wins + swingA.wins + swingB.wins;
            const totalLosses = tierA.losses + tierB.losses + swingA.losses + swingB.losses;

            const html = `
                <div class="grid-3col" style="margin-bottom: 24px;">

                        <div class="card-title">Total P&L</div>

                        const pnl = t.data.total_pnl || 0;

                        const pnlSign = pnl >= 0 ? '+' : '';
                        return \`
                    <div class="tier-item">
                        <span class="tier-name">\${t.name}</span>
                        <div class="tier-stats">
                            <div class="tier-stat"><span class="tier-label">W:</span><span class="tier-value">\${t.data.wins || 0}</span></div>
                            <div class="tier-stat"><span class="tier-label">L:</span><span class="tier-value">\${t.data.losses || 0}</span></div>
                            <div class="tier-stat"><span class="tier-label">P&L:</span><span class="tier-value" style="color: \${pnlColor};">\${pnlSign}\${formatNumber(pnl)}</span></div>

            document.getElementById('performanceTab').innerHTML = html;

            setTimeout(() => {
                renderPnLDistChart();

        function renderPnLDistChart() {
            if (chartInstances.pnlDistChart) chartInstances.pnlDistChart.destroy();

            const stats = D.performance?.stats || {};
            const allTiers = [
                stats.dte_tier_a || stats.tier_a_0dte || {},
                stats.dte_tier_b || stats.tier_b_0dte || {},
                stats.swing_tier_a || {},
                stats.swing_tier_b || {}
            ];
            const totalW = allTiers.reduce((s, t) => s + (t.wins || 0), 0);
            const totalL = allTiers.reduce((s, t) => s + (t.losses || 0), 0);

            const ctx = document.getElementById('pnlDistChart').getContext('2d');
            chartInstances.pnlDistChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Wins', 'Losses'],
                    datasets: [{
                        data: [totalW || 0, totalL || 0],
                        backgroundColor: ['#00e396', '#ff4560']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#8899bb' } } }
                }
            });
        }

        function renderWeeklyChart() {
            if (chartInstances.weeklyChart) chartInstances.weeklyChart.destroy();

            const ctx = document.getElementById('weeklyChart').getContext('2d');
            const history = D.performance?.weekly_pnl_history || [{ week: 'W1', pnl: 0 }];

            chartInstances.weeklyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: history.map(h => h.week),
                    datasets: [{
                        label: 'P&L',
                        data: history.map(h => h.pnl),
                        backgroundColor: history.map(h => h.pnl >= 0 ? '#00e396' : '#ff4560')
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#1a2540' }, ticks: { color: '#8899bb' } },
                        x: { grid: { display: false }, ticks: { color: '#8899bb' } }

        }

        function setupTabs() {
            // Tabs already set up in renderHeader
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toFixed(2);
        }

        function formatKPI(value, format) {
            if (format === 'price') return value.toFixed(2);
            if (format === 'currency') return `$${value >= 0 ? '+' : ''}${formatNumber(value)}`;
            if (format === 'percent') return value.toFixed(1) + '%';
            return value;
        }

        function getValueClass(value) {
            if (typeof value === 'number') {
                if (value > 0) return 'positive';
                if (value < 0) return 'negative';
            }
            return 'neutral';
        }

        init();
    </script>
